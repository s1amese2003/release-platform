<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Platform Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left"></div>
    <div class="bg-shape bg-shape-right"></div>

    <header class="hero">
      <div>
        <h1>Release Admission Console</h1>
        <p>制品准入、风险扫描、审批发布一体化控制台</p>
      </div>
      <div class="hero-status" id="healthBadge">Checking...</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>创建发布单</h2>
        <form id="createForm" class="grid-form">
          <label>应用
            <input name="application" value="order-service" required />
          </label>
          <label>环境
            <input name="environment" value="dev" required />
          </label>
          <label>版本
            <input name="version" id="versionInput" required />
          </label>
          <label>上传人
            <input name="uploader" value="alice" required />
          </label>
          <label>负责人
            <input name="owner" value="team-order" required />
          </label>
          <button type="submit">创建</button>
        </form>

        <h2>发布动作</h2>
        <div class="actions">
          <div class="action-row">
            <input type="file" id="artifactFile" />
            <button id="uploadBtn" type="button">上传制品</button>
          </div>
          <div class="action-row">
            <button id="scanBtn" type="button">触发扫描</button>
            <button id="approveBtn" type="button">二级审批</button>
            <button id="deployBtn" type="button">触发部署</button>
          </div>
        </div>

        <h2>发布单列表</h2>
        <div class="table-wrap">
          <table id="releaseTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>应用</th>
                <th>版本</th>
                <th>扫描</th>
                <th>准入</th>
                <th>审批</th>
                <th>部署</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>发布单详情</h2>
        <div class="selected-id" id="selectedReleaseText">当前选择: -</div>

        <div class="cards" id="summaryCards">
          <article class="card">
            <h3>SQL 风险</h3>
            <p id="riskStat">-</p>
          </article>
          <article class="card">
            <h3>配置差异</h3>
            <p id="configStat">-</p>
          </article>
          <article class="card">
            <h3>准入结论</h3>
            <p id="resultStat">-</p>
          </article>
        </div>

        <h3>SQL 命中详情</h3>
        <div class="table-wrap small">
          <table id="sqlIssueTable">
            <thead>
              <tr>
                <th>#</th>
                <th>风险</th>
                <th>规则</th>
                <th>片段</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <h3>配置差异</h3>
        <div class="table-wrap small">
          <table id="configDiffTable">
            <thead>
              <tr>
                <th>配置键</th>
                <th>线上值</th>
                <th>待发布值</th>
                <th>类型</th>
                <th>关键项</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <h3>实时消息</h3>
        <pre id="logBox" class="log-box"></pre>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
